name: Déploiement GitHub Pages

on:
  push:
    branches:
      - main
      - claude/responsive-web-app-59m2qn
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Application principale (Boulangerie ERP) → racine du site
      - run: npm ci
      - run: npm run build
      # Application autonome « Écritures SAGE » → sous-chemin /ecritures-sage/
      # (build indépendant ; base relative, donc fonctionne sous ce sous-chemin).
      # Les clés Supabase sont facultatives : si elles ne sont pas définies en
      # secrets du dépôt, l'app tourne en stockage local du navigateur.
      - run: npm ci
        working-directory: ecritures-sage
      - run: npm run build
        working-directory: ecritures-sage
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - run: mkdir -p dist/ecritures-sage && cp -r ecritures-sage/dist/. dist/ecritures-sage/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
