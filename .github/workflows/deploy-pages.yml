name: Déploiement GitHub Pages

on:
  push:
    branches:
      - main
      - claude/responsive-web-app-59m2qn
      - claude/ci-payroll-saas-ftjsdo
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Application principale (Boulangerie ERP) → racine du site
      - run: npm ci
      - run: npm run build
      # Application autonome « Écritures SAGE » → sous-chemin /ecritures-sage/
      # (build indépendant ; base relative, donc fonctionne sous ce sous-chemin).
      # Les clés Supabase sont facultatives : si elles ne sont pas définies en
      # secrets du dépôt, l'app tourne en stockage local du navigateur.
      - run: npm ci
        working-directory: ecritures-sage
      - run: npm run build
        working-directory: ecritures-sage
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - run: mkdir -p dist/ecritures-sage && cp -r ecritures-sage/dist/. dist/ecritures-sage/
      # Application autonome « Wave → SAGE » → sous-chemin /wave-sage/
      # Base de données DÉDIÉE : secrets distincts (VITE_WAVE_SUPABASE_*). S'ils
      # ne sont pas définis, l'app tourne en stockage local du navigateur.
      - run: npm ci
        working-directory: wave-sage
      - run: npm run build
        working-directory: wave-sage
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_WAVE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_WAVE_SUPABASE_ANON_KEY }}
      - run: mkdir -p dist/wave-sage && cp -r wave-sage/dist/. dist/wave-sage/
      # Application autonome « PaieCI » (bulletins de paie) → sous-chemin
      # /gestion-paie/. Base relative ; les clés Supabase sont facultatives
      # (repli en mode démonstration / stockage local si non définies).
      - run: npm ci
        working-directory: gestion-paie
      - run: npm run build
        working-directory: gestion-paie
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_PAIE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_PAIE_SUPABASE_ANON_KEY }}
      - run: mkdir -p dist/gestion-paie && cp -r gestion-paie/dist/. dist/gestion-paie/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
