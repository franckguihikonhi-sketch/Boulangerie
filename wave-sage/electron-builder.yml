# Configuration d'empaquetage de l'application de bureau « Wave → SAGE »
# (electron-builder). Le renderer est le build Vite (dossier dist/), le process
# principal est electron/main.cjs.
appId: com.franckkonhi.wavesage
productName: Wave-SAGE
copyright: © Mr Franck G. KONHI

directories:
  output: release
  buildResources: build

# Fichiers embarqués dans l'application.
files:
  - dist/**/*
  - electron/**/*
  - package.json

# Injecte le point d'entrée Electron dans le package.json empaqueté.
extraMetadata:
  main: electron/main.cjs

# Windows : installateur NSIS (.exe) + version portable (un seul .exe).
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: Wave-SAGE-Setup-${version}.${ext}
portable:
  artifactName: Wave-SAGE-Portable-${version}.${ext}

# macOS : image disque (.dmg), non signée (usage interne).
mac:
  target: dmg
  category: public.app-category.finance
  artifactName: Wave-SAGE-${version}.${ext}

# Linux : AppImage exécutable.
linux:
  target: AppImage
  category: Office
  artifactName: Wave-SAGE-${version}.${ext}
